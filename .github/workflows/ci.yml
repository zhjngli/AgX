name: CI

on:
  pull_request:
    branches: [main]

jobs:
  fast-checks:
    name: Fast checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -p agx -p agx-cli -- -D warnings
      - name: Library tests
        run: cargo test -p agx
      - name: CLI tests
        run: cargo test -p agx-cli

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libraw
        run: sudo apt-get update && sudo apt-get install -y libraw-dev
      - name: Build CLI
        run: cargo build -p agx-cli
      - name: E2E tests
        run: cargo test -p agx-e2e
